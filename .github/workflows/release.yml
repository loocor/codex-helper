name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION%%-*}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp src-tauri/tauri.conf.json
          perl -0pi -e 's/^version = ".*"/version = "'"$VERSION"'"/m' src-tauri/Cargo.toml
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Import signing certificate
        env:
          P12: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          echo "$P12" | base64 --decode > "$RUNNER_TEMP/cert.p12" 2>/dev/null || echo "$P12" | base64 -D > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"
          security default-keychain -d user -s "$KEYCHAIN"

      - name: Validate release signing inputs
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "${APPLE_SIGNING_IDENTITY:-}" || "${APPLE_SIGNING_IDENTITY}" == "-" ]]; then
            echo "APPLE_SIGNING_IDENTITY is required for release builds" >&2
            exit 1
          fi
          HAS_API_KEY=0
          if [[ -n "${APPLE_API_KEY:-}" && -n "${APPLE_API_ISSUER:-}" && -n "${APPLE_API_PRIVATE_KEY:-}" ]]; then
            HAS_API_KEY=1
          fi
          HAS_APPLE_ID=0
          if [[ -n "${APPLE_ID:-}" && -n "${APPLE_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]]; then
            HAS_APPLE_ID=1
          fi
          if [[ "$HAS_API_KEY" != "1" && "$HAS_APPLE_ID" != "1" ]]; then
            echo "complete notarization credentials are required for release builds" >&2
            exit 1
          fi

      - name: Prepare notary API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          if [[ -n "${APPLE_API_KEY:-}" && -n "${APPLE_API_PRIVATE_KEY:-}" ]]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
            printf '%s' "$APPLE_API_PRIVATE_KEY" > "$KEY_PATH"
            chmod 600 "$KEY_PATH"
            echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Build DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          REQUIRE_SIGNING: "1"
          REQUIRE_NOTARIZE: "1"
          OUTPUT_DIR: ${{ github.workspace }}/dist/macos
        run: |
          chmod +x scripts/build-macos-dmg.sh
          scripts/build-macos-dmg.sh "$VERSION" "${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.target }}
          path: dist/macos/*.dmg

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/macos
          merge-multiple: true

      - run: find dist -name '*.dmg' -print
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.dmg
